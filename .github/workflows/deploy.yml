name: Build and Deploy to EC2

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and push API image
        run: |
          docker build -t ghcr.io/${{ secrets.GHCR_USERNAME }}/ml-churn-production-api:latest .
          docker push ghcr.io/${{ secrets.GHCR_USERNAME }}/ml-churn-production-api:latest

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::451721888959:role/GitHubActionsSSMDeployRole
          aws-region: eu-north-1

      - name: Deploy via SSM
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "i-02fee0fca114dae31" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy ml-churn-production via GitHub Actions" \
            --parameters '{
              "commands": [
                "cd /home/ubuntu/ml-churn-production",
                "echo '${{ secrets.GHCR_TOKEN }}' | docker login ghcr.io -u '${{ secrets.GHCR_USERNAME }}' --password-stdin",
                "docker compose pull",
                "docker compose up -d",
                "docker image prune -f"
              ]
            }' \
            --query "Command.CommandId" \
            --output text)

          echo "SSM Command ID: $COMMAND_ID"

          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "i-02fee0fca114dae31"

          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "i-02fee0fca114dae31"