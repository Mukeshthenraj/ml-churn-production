services:
  db:
    image: postgres:16
    container_name: churn-db
    environment:
      POSTGRES_USER: churn_user
      POSTGRES_PASSWORD: churn_pass
      POSTGRES_DB: churn_db
    ports:
      - "5432:5432"
    volumes:
      - ./data/pgdata:/var/lib/postgresql/data

  api:
    #build: .
    image: ghcr.io/mukeshthenraj/ml-churn-production-api:latest
    container_name: churn-api
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql+psycopg2://churn_user:churn_pass@db:5432/churn_db
    ports:
      - "8000:8000"
    volumes:
      - ./data/model:/app/data/model:ro

  prometheus:
    image: prom/prometheus:latest
    container_name: churn-prometheus
    depends_on:
      - api
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:latest
    container_name: churn-grafana
    depends_on:
      - prometheus
    ports:
      - "3000:3000"
    volumes:
      - ./data/grafana:/var/lib/grafana